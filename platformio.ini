[env:esp32-2432S028Rv3]
platform = espressif32
board = esp32dev
framework = arduino

upload_speed = 2000000

; OTA upload — set upload_protocol and upload_port to push over WiFi
; upload_port     = 192.168.1.xx   ; replace with device IP (shown in serial / mDNS: pitpirate.local)
upload_protocol = espota
upload_port     = pitpirate.local
; upload_port     = 192.168.179.3

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder

; WiFi + WebServer + TFT_eSPI still benefit from the larger app partition
board_build.partitions = partitions_2mb_fs.csv

board_build.filesystem = littlefs

; Auto-runs `npm run build` in frontend/ before building/uploading the FS image
extra_scripts = pre:scripts/build_frontend.py

lib_deps =
	bodmer/TFT_eSPI @ ^2.5.34
	https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
	bitbank2/PNGdec @ ^1.0.1
	bitbank2/AnimatedGIF @ ^2.1.1
	https://github.com/yoprogramo/QRcodeDisplay

build_flags =
	-DUSER_SETUP_LOADED
	-DSMOOTH_FONT
	-DLOAD_GLCD
	-DLOAD_FONT2
	-DLOAD_GFXFF
	-DUSE_HSPI_PORT
	-DST7789_DRIVER
	-DTFT_INVERSION_OFF
	-DTFT_RGB_ORDER=TFT_BGR
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BL=21
	-DTFT_BACKLIGHT_ON=HIGH
	-DBOARD_HAS_RGB_LED=1
	-DRGB_LED_R=4
	-DRGB_LED_G=16
	-DRGB_LED_B=17
	-DSPI_FREQUENCY=80000000
	-DSPI_READ_FREQUENCY=4000000
	-DSPI_TOUCH_FREQUENCY=2500000
